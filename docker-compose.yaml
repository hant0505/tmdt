version: "3.8"

services:

  php:
    build: .
    container_name: magento_php
    volumes:
      - ./magento:/var/www/html
    working_dir: /var/www/html

  nginx:
    image: nginx:1.24
    container_name: magento_nginx
    ports:
      - "80:80"
    volumes:
      - ./magento:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql:8
    container_name: magento_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: magento
      MYSQL_USER: magento
      MYSQL_PASSWORD: magento123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: magento_redis

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.12
    container_name: magento_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

volumes:
  mysql_data:
